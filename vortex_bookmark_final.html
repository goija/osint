<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>VORTEX v72 // BOOKMARK INTELLIGENCE</title>
    <style>
        :root {
            --vortex-cyan: #00e5ff;
            --vortex-magenta: #ff00ff;
            --vortex-bg: #050608;
            --panel-bg: #0a0c11;
            --neon-green: #00ff66;
            --alert-yellow: #ffea00;
        }

        body {
            background-color: var(--vortex-bg);
            color: var(--vortex-cyan);
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 20px;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid var(--vortex-magenta);
            padding-bottom: 10px; margin-bottom: 20px;
        }

        .header h1 { margin: 0; letter-spacing: 3px; text-shadow: 0 0 10px var(--vortex-magenta); }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 229, 255, 0.2);
            padding: 15px;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .panel-title {
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 1px solid var(--vortex-cyan);
            margin-bottom: 15px;
            padding-bottom: 5px;
            display: flex; justify-content: space-between;
        }

        #drop-zone {
            border: 2px dashed var(--vortex-magenta);
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255, 0, 255, 0.05);
        }

        #drop-zone:hover { background: rgba(255, 0, 255, 0.15); border-color: #fff; }

        .link-item {
            font-size: 0.85rem;
            padding: 8px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .link-item:hover { background: rgba(0, 229, 255, 0.05); }

        .link-url { color: #fff; text-decoration: none; max-width: 70%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .cat-tag {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
            color: #000;
        }

        .cat-social { background: #1d9bf0; color: #fff; }
        .cat-cloud { background: var(--vortex-magenta); }
        .cat-dev { background: var(--alert-yellow); }
        .cat-recon { background: var(--neon-green); }

        .terminal {
            background: #000;
            color: var(--neon-green);
            padding: 10px;
            font-size: 0.8rem;
            height: 150px;
            overflow-y: auto;
            margin-top: 20px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>VORTEX // BOOKMARK ANALYZER</h1>
        <p>LOCAL PATH: /home/ontwerp/Bureaublad/bookmarks.html // STATUS: AWAITING INJECTION</p>
    </div>

    <div class="main-container">
        <div class="panel">
            <div class="panel-title"><span>[01] Data Source</span></div>
            <div id="drop-zone">
                DRAG & DROP<br>bookmarks.html<br>HIER
            </div>
            <div class="terminal" id="term">
                > System idle.<br>
                > Awaiting file upload...
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">
                <span>[02] Extracted Intelligence</span>
                <span id="count" style="color: var(--vortex-magenta);">0 LINKS</span>
            </div>
            <div id="link-list">
                <div style="color: #666; text-align: center; margin-top: 50px;">Injecteer bestand om de linkmatrix te genereren.</div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const linkList = document.getElementById('link-list');
        const term = document.getElementById('term');
        const countDisplay = document.getElementById('count');

        dropZone.addEventListener('dragover', (e) => e.preventDefault());
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            const reader = new FileReader();

            term.innerHTML += `> Loading: ${file.name}...<br>`;

            reader.onload = (event) => {
                const content = event.target.result;
                parseBookmarks(content);
            };
            reader.readAsText(file);
        });

        function parseBookmarks(html) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, "text/html");
            const links = doc.querySelectorAll('a');
            
            linkList.innerHTML = "";
            let count = 0;

            links.forEach(a => {
                count++;
                const url = a.href;
                const text = a.textContent || "Untitled";
                let category = "RECON";
                let catClass = "cat-recon";

                if(url.includes("x.com") || url.includes("twitter.com")) { category = "SOCIAL"; catClass = "cat-social"; }
                if(url.includes("filebase") || url.includes("s3") || url.includes("ipfs")) { category = "CLOUD"; catClass = "cat-cloud"; }
                if(url.includes("github") || url.includes("colab") || url.includes("botmaker")) { category = "DEV_OPS"; catClass = "cat-dev"; }

                const div = document.createElement('div');
                div.className = "link-item";
                div.innerHTML = `
                    <a href="${url}" target="_blank" class="link-url">${text}</a>
                    <span class="cat-tag ${catClass}">${category}</span>
                `;
                linkList.appendChild(div);
            });

            countDisplay.innerText = `${count} LINKS GEVONDEN`;
            term.innerHTML += `> Extractie voltooid.<br>> ${count} objecten gemapt naar database.`;
            term.scrollTop = term.scrollHeight;
        }
    </script>
</body>
</html>
